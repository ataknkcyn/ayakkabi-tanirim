<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayakkabı Tanıma Uygulaması</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Sayfa Başlığı -->
  <header>
    <div class="header-inner">
      <h1>👟 Ayakkabı Tanıma</h1>
      <p class="subtitle">Fotoğraf yükle, yapay zeka ile tanı</p>
    </div>
  </header>

  <!-- Ana İçerik -->
  <main>

    <!-- Fotoğraf Yükleme Bölümü -->
    <section id="upload-section">
      <!-- API Key Girişi -->
      <div id="api-key-section">
        <label for="api-key-input">Claude API Anahtarı</label>
        <div class="api-key-row">
          <input
            type="password"
            id="api-key-input"
            placeholder="Claude API anahtarınızı girin"
            autocomplete="off"
          >
          <button type="button" id="api-key-toggle" class="btn-icon" aria-label="Göster/Gizle">Göster</button>
          <button type="button" id="api-key-save" class="btn-save">Kaydet</button>
        </div>
        <p id="api-key-saved-msg" class="api-key-saved" hidden>API anahtarı kaydedildi ✓</p>
      </div>

      <!-- Sürükle & Bırak Alanı -->
      <div id="drop-zone">
        <div class="drop-zone-inner">
          <span class="drop-icon">📁</span>
          <p>Fotoğrafı buraya sürükle ya da</p>
          <label for="file-input" class="btn-upload">Dosya Seç</label>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>
      </div>

      <!-- Seçilen Fotoğraf Önizlemesi -->
      <div id="preview-section" hidden>
        <img id="preview-image" src="" alt="Seçilen fotoğraf">
        <button id="analyze-btn" class="btn-primary">Analiz Et</button>
      </div>
    </section>

    <!-- Sonuç Bölümü -->
    <section id="result-section" hidden>
      <!-- Yükleme Animasyonu -->
      <div id="loading-indicator" hidden>
        <div class="spinner"></div>
        <p>Analiz ediliyor…</p>
      </div>

      <!-- Sonuç Kartı -->
      <div id="result-card" hidden>
        <h2>Tanıma Sonucu</h2>
        <ul id="result-list">
          <li><span class="label">Marka</span><span id="res-brand" class="value"></span></li>
          <li><span class="label">Model</span><span id="res-model" class="value"></span></li>
          <li><span class="label">Renk</span><span id="res-color" class="value"></span></li>
          <li><span class="label">Tip</span><span id="res-type" class="value"></span></li>
          <li><span class="label">Tahmini Fiyat</span><span id="res-price" class="value"></span></li>
        </ul>
        <button id="reset-btn" class="btn-secondary">Yeniden Dene</button>
      </div>

      <!-- Hata Mesajı -->
      <div id="error-box" hidden>
        <p id="error-message"></p>
        <button id="error-reset-btn" class="btn-secondary">Geri Dön</button>
      </div>
    </section>

  </main>

  <!-- Sayfa Altbilgisi -->
  <footer>
    <p>Ayakkabı Tanıma Uygulaması &copy; 2026 — Claude AI ile güçlendirilmiştir</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
